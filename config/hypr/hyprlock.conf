background {
    monitor =
    path = ~/.config/hypr/wallpapers/lock/matrix.jpg
    blur_passes = 0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 4
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(00ff41)
    inner_color = rgb(0d0d0d)
    font_color = rgb(00ff41)
    fade_on_empty = true
    placeholder_text = <i>password</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(00ff41)
    font_size = 64
    font_family = Atkinson Hyperlegible Bold
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgb(00ff41)
    font_size = 24
    font_family = Atkinson Hyperlegible
    position = 0, 120
    halign = center
    valign = center
}
